<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPUB 메이커</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>

  <header>
    <div class="logo">
      <span class="logo-icon">📖</span>
      <span class="logo-text">EPUB 메이커</span>
    </div>
    <p class="tagline">텍스트를 아름다운 전자책으로</p>
  </header>

  <main>
    <!-- Step 1: Book Info -->
    <section class="card" id="section-info">
      <div class="step-label">01</div>
      <h2>책 정보</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="book-title">제목 <span class="req">*</span></label>
          <input type="text" id="book-title" placeholder="예) 나의 이야기" />
        </div>
        <div class="form-group">
          <label for="book-author">저자 <span class="req">*</span></label>
          <input type="text" id="book-author" placeholder="예) 홍길동" />
        </div>
        <div class="form-group">
          <label for="book-language">언어</label>
          <select id="book-language">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
          </select>
        </div>
        <div class="form-group">
          <label for="book-publisher">출판사 (선택)</label>
          <input type="text" id="book-publisher" placeholder="예) 독립출판사" />
        </div>
      </div>
      <div class="form-group full-width">
        <label for="book-description">책 소개 (선택)</label>
        <textarea id="book-description" rows="3" placeholder="책에 대한 간단한 소개를 입력하세요"></textarea>
      </div>
    </section>

    <!-- Step 2: Cover Image -->
    <section class="card" id="section-cover">
      <div class="step-label">02</div>
      <h2>표지 이미지 <span class="optional-label">(선택)</span></h2>
      <div class="cover-upload-area" id="cover-upload-area">
        <input type="file" id="cover-file-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" />
        <div class="cover-placeholder" id="cover-placeholder">
          <div class="cover-placeholder-icon">🖼</div>
          <p class="cover-placeholder-text">이미지를 클릭하거나 드래그하여 업로드</p>
          <p class="cover-placeholder-sub">JPG, PNG, WEBP · 권장 비율 6:9</p>
        </div>
        <div class="cover-preview-wrap" id="cover-preview-wrap" style="display:none">
          <img id="cover-preview-img" src="" alt="표지 미리보기" />
          <div class="cover-overlay">
            <button class="cover-change-btn" id="cover-change-btn">이미지 변경</button>
            <button class="cover-remove-btn" id="cover-remove-btn">삭제</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Step 3: Chapters -->
    <section class="card" id="section-chapters">
      <div class="step-label">03</div>
      <h2>챕터 구성</h2>
      <div id="chapters-list"></div>
      <button class="btn-add" id="add-chapter">
        <span>+</span> 챕터 추가
      </button>
    </section>

    <!-- Step 4: Style -->
    <section class="card" id="section-style">
      <div class="step-label">04</div>
      <h2>스타일 설정</h2>
      <div class="style-options">
        <div class="style-card" data-style="classic" title="클래식">
          <div class="style-preview classic-prev">
            <div class="prev-title">제목</div>
            <div class="prev-body">본문 텍스트 예시입니다.</div>
          </div>
          <span>클래식</span>
        </div>
        <div class="style-card selected" data-style="modern" title="모던">
          <div class="style-preview modern-prev">
            <div class="prev-title">제목</div>
            <div class="prev-body">본문 텍스트 예시입니다.</div>
          </div>
          <span>모던</span>
        </div>
        <div class="style-card" data-style="minimal" title="미니멀">
          <div class="style-preview minimal-prev">
            <div class="prev-title">제목</div>
            <div class="prev-body">본문 텍스트 예시입니다.</div>
          </div>
          <span>미니멀</span>
        </div>
        <div class="style-card" data-style="warm" title="따뜻한">
          <div class="style-preview warm-prev">
            <div class="prev-title">제목</div>
            <div class="prev-body">본문 텍스트 예시입니다.</div>
          </div>
          <span>따뜻함</span>
        </div>
      </div>
      <div class="font-options">
        <label>폰트 크기</label>
        <div class="font-size-btns">
          <button class="fs-btn" data-size="small">작게</button>
          <button class="fs-btn active" data-size="medium">보통</button>
          <button class="fs-btn" data-size="large">크게</button>
        </div>
      </div>
    </section>

    <!-- Generate Button -->
    <div class="generate-area">
      <button class="btn-generate" id="generate-btn">
        <span class="btn-icon">✦</span>
        EPUB 생성하기
      </button>
      <p class="generate-hint">모든 챕터가 하나의 .epub 파일로 변환됩니다</p>
    </div>

    <!-- Progress -->
    <div class="progress-area" id="progress-area" style="display:none">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="progress-text" id="progress-text">처리 중...</p>
    </div>
  </main>

  <footer>
    <p>EPUB 메이커 · GitHub Pages에서 무료로 사용 · <a href="https://github.com" target="_blank">소스코드</a></p>
  </footer>

  <script src="epub.js"></script>
  <script src="app.js"></script>
</body>
</html>
